<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Creative Work</title>

    <link rel="stylesheet" href="/src/css/style.css">
    <link rel="stylesheet" href="/src/css/themes.css">
    <link rel="stylesheet" href="/auth/auth.css">
    <link rel="stylesheet" href="./bookshelf.css">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>

    <!-- Fun Stuff :) -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navigation Bar -->
    <load src="src/partials/navbar.html" />

    <div class="bookshelf">
        <div class="category-nav">
            <button class="nav-btn active" data-display-name="Kurzgeschichten" data-table-name="ShortStories" title="Kurzgeschichten" aria-label="Kurzgeschichten">
                <img src="/images/bookshelf/Icon-ShortStories.svg" alt="" class="nav-icon" />
            </button>
            
            <button class="nav-btn" data-display-name="Detektiv Ronny" data-table-name="DetectiveRonny" title="Detektiv Ronny" aria-label="Detektiv Ronny">
                <img src="/images/bookshelf/Icon-DetectiveRonny.svg" alt="" class="nav-icon" />
            </button>
            
            <button class="nav-btn" data-display-name="Agent Bullet" data-table-name="AgentBullet" title="Agent Bullet" aria-label="Agent Bullet">
                <img src="/images/bookshelf/Icon-AgentBullet.svg" alt="" class="nav-icon" />
            </button>

            <button class="nav-btn" data-display-name="Gedichte" data-table-name="Poems" title="Gedichte" aria-label="Gedichte">
                <img src="/images/bookshelf/Icon-Poems.svg" alt="" class="nav-icon" />
            </button>
        </div>

        <div class="shelf-row">
            <h2 class="shelf-title" id="selected-shelf-title">Kurzgeschichten</h2>
            <div class="books-container" id="selected-shelf"></div>
        </div>

        <div id="book-tooltip" class="tooltip-box">Klick auf ein "Buch", um es zu lesen. Scrolle nach links und rechts, um alles zu sehen.</div>

    </div>

    <!-- Socials -->
    <load src="/src/partials/footer.html" />

    <script type="module" src="/src/js/themes.js"></script>
    <script type="module" src="/src/js/floating-shapes.js"></script>
    <script type="module" src="./bookshelf.js"></script>

</body>
</html>
